<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#0f1e36"/>
      <stop offset="100%" stop-color="#06101f"/>
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffb84d"/>
      <stop offset="55%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#7a1020"/>
    </linearGradient>
  </defs>

  <!-- Outer circle (now visually dominant) -->
  <circle cx="250" cy="250" r="245" fill="url(#bg)"/>
  <circle cx="250" cy="250" r="240" fill="none" stroke="#d4a574" stroke-width="1.2" opacity="0.45"/>
  <circle cx="250" cy="250" r="232" fill="none" stroke="#d4a574" stroke-width="0.5" opacity="0.25"/>

  <!-- Inner rectangle, well inset from the circle edge -->
  <rect x="115" y="190" width="270" height="135" rx="10" fill="none" stroke="#d4a574" stroke-width="1.3"/>

  <!-- CASPIAN -->
  <text x="225" y="248" text-anchor="end"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="36" font-weight="700" fill="#d4a574" letter-spacing="2.5">CASPIAN</text>

  <!-- Flame in center -->
  <g transform="translate(250 232)">
    <path d="M0 -22 C 5 -13 13 -10 13 3 a 13 13 0 1 1 -26 0 c 0 -7 3 -9 5 -13 0 3 2 5 3 3 0 -6 -2 -10 5 -16 z"
          fill="url(#flame)"/>
  </g>

  <!-- FLAME -->
  <text x="275" y="248" text-anchor="start"
        font-family="Cormorant Garamond, Georgia, serif"
        font-size="36" font-weight="700" fill="#d4a574" letter-spacing="2.5">FLAME</text>

  <!-- Divider -->
  <line x1="135" y1="266" x2="365" y2="266" stroke="#d4a574" stroke-width="0.7" opacity="0.7"/>

  <!-- Tagline -->
  <text x="250" y="285" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="8" font-weight="500" fill="#d4a574" letter-spacing="2.5">MEDITERRANEAN SOUL · ANATOLIAN HEART</text>
  <text x="250" y="299" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="8" font-weight="500" fill="#d4a574" letter-spacing="2.5">CAUCASIAN TASTE</text>

  <!-- Stars -->
  <text x="250" y="318" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="11" fill="#d4a574" letter-spacing="5">★ ★ ★ ★ ★</text>
</svg>
